<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | AeroPredict</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/style.css?v=4">
    <!-- Anti-FOUC: apply saved theme immediately -->
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('aeropredict_theme') || 'dark');</script>
</head>
<body class="auth-page">
    <div class="bg-gradient"></div>
    <div class="bg-glow"></div>

    <div class="app-container auth-container">
        <header class="app-header animate-fade-in" style="position: relative;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <a href="/" class="logo logo-link">
                    <i class="fa-solid fa-plane-departure brand-icon"></i>
                    <span class="brand-name">Aero<span>Predict</span></span>
                </a>
                <button class="theme-toggle" id="theme-toggle-btn" aria-label="Toggle dark/light mode" title="Toggle theme">
                    <div class="toggle-track">
                        <div class="toggle-thumb">
                            <i class="fa-solid fa-moon" id="theme-icon"></i>
                        </div>
                    </div>
                </button>
            </div>
            <div style="text-align: left; margin-top: 1.5rem;">
                <a href="/" class="back-link" style="display: inline-flex;"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
            </div>
        </header>

        <main class="main-content">
            <section class="card form-card animate-slide-up" id="auth-section">
                <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
                    <div style="display: flex; align-items: center; gap: 1rem;">
                        <i class="fa-solid fa-user-plus card-icon" style="font-size: 1.8rem;"></i>
                        <h2 style="line-height: 1.2;">Create<br>Account</h2>
                    </div>
                    <p class="auth-subtitle" style="text-align: left; margin: 0;">Join AeroPredict<br>today</p>
                </div>
                <form id="signup-form">
                    <div class="form-grid auth-grid">
                        <div class="input-group full-width">
                            <label for="name">Full Name</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-user input-icon"></i>
                                <input type="text" id="name" required placeholder="John Doe">
                            </div>
                        </div>

                        <div class="input-group full-width">
                            <label for="email">Email Address</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-envelope input-icon"></i>
                                <input type="email" id="email" required placeholder="you@example.com">
                            </div>
                        </div>

                        <div class="input-group full-width">
                            <label for="password">Password</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-lock input-icon"></i>
                                <input type="password" id="password" required placeholder="••••••••">
                                <i class="fa-solid fa-eye-slash toggle-password" onclick="togglePasswordVisibility('password', this)"></i>
                            </div>
                        </div>
                    </div>

                    <div id="auth-error" class="auth-error hidden"></div>

                    <button type="submit" class="submit-btn" id="signup-btn">
                        <span>Sign Up</span>
                        <i class="fa-solid fa-user-check btn-icon"></i>
                    </button>
                    
                    <p class="auth-switch">Already have an account? <a href="/login">Log in</a></p>
                </form>
            </section>
        </main>
    </div>

    <!-- Custom Script for Auth -->
    <script src="/script.js?v=4"></script>
</body>
</html>
